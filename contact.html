<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
     <!-- Header -->
    <header>
        <h1>Contact Form</h1>

        <!-- Navigation -->
        <nav>
            <a href="index.html">Home</a> |
            <a href="contact.html">Contact</a>
        </nav>

        <hr>
    </header>

    <!-- Main Content -->
    <main>

        <div>

            <form action="#" method="post">

                <!-- Full Name -->
                <label for="fullname">Full Name:</label><br>
                <input
                    type="text"
                    id="fullname"
                    name="fullname"
                    placeholder="Enter your full name"
                    required>
                <br><br>

                <!-- Email -->
                <label for="email">Email:</label><br>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required>
                <br><br>

                <!-- Password -->
                <label for="password">Password:</label><br>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    required>
                <br><br>

                <!-- Gender -->
                <label>Gender:</label><br>

                <input
                    type="radio"
                    name="gender"
                    value="Male">
                Male

                <input
                    type="radio"
                    name="gender"
                    value="Female">
                Female

                <br><br>

                <!-- Hobbies -->
                <label>Hobbies:</label><br>

                <input
                    type="checkbox"
                    name="hobby"
                    value="Reading">
                Reading

                <input
                    type="checkbox"
                    name="hobby"
                    value="Coding">
                Coding

                <input
                    type="checkbox"
                    name="hobby"
                    value="Sports">
                Sports

                <br><br>

                <!-- Dropdown -->
                <label for="state">State:</label><br>

                <select id="state" name="state">
                    <option value="">Select State</option>
                    <option value="Lagos">Lagos</option>
                    <option value="Enugu">Enugu</option>
                    <option value="Abuja">Abuja</option>
                    <option value="Anambra">Anambra</option>
                </select>

                <br><br>

                <!-- Textarea -->
                <label for="message">Message:</label><br>

                <textarea
                    id="message"
                    name="message"
                    rows="5"
                    cols="40"
                    placeholder="Enter your message">
                </textarea>

                <br><br>

                <!-- Submit Button -->
                <input
                    type="submit"
                    value="Submit Form">

            </form>

        </div>

    </main>

    <hr>

    <!-- Footer -->
    <footer>
        <p>&copy; Ruth 2026 | All Rights Reserved.</p>
    </footer>

</body>
</html>
